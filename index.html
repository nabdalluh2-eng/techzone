<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechZone - متجر الإلكترونيات</title>
    <style>
        :root {
            --primary-color: #0d233a; 
            --accent-color: #1a3a5f;
            --background-color: #f9f9f7; 
            --text-color: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--background-color); color: var(--text-color); padding-bottom: 60px; }

        header { background: white; text-align: center; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo-area { display: inline-block; cursor: pointer; user-select: none; min-height: 50px; }
        .logo-img { max-height: 70px; display: block; margin: 0 auto; }

        .categories-bar { max-width: 1200px; margin: 20px auto 0 auto; padding: 0 20px; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .categories-bar::-webkit-scrollbar { display: none; }
        .category-btn { background: white; border: 1px solid #ddd; padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold; transition: 0.3s; color: var(--text-color); }
        .category-btn.active, .category-btn:hover { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; min-height: 200px; }
        .product-card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .product-card .img-container { width: 100%; height: 180px; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fafafa; border-radius: 5px; }
        .product-card img { max-width: 100%; max-height: 100%; object-fit: contain; transition: 0.3s; }
        .product-card .img-container:hover img { transform: scale(1.05); }
        .product-badge { position: absolute; top: 10px; right: 10px; background: rgba(13, 35, 58, 0.1); color: var(--primary-color); padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .product-title { font-size: 16px; color: #222; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 44px; text-align: right; }
        .product-price { color: var(--primary-color); font-weight: bold; margin: 10px 0; text-align: right; font-size: 18px; }
        
        .add-btn { background: var(--primary-color); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; transition: 0.3s; font-weight: bold; font-size: 14px; }
        .add-btn:hover { background: var(--accent-color); }

        .cart-badge { position: fixed; bottom: 80px; left: 20px; background: var(--primary-color); color: white; padding: 15px; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 20px; z-index: 99; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
        .cart-count { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 12px; padding: 3px 7px; border-radius: 50%; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal-content { background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .close-btn { position: absolute; top: 10px; left: 10px; font-size: 28px; cursor: pointer; color: #666; transition: 0.3s; line-height: 1; }
        .close-btn:hover { color: #000; }
        
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        
        .view-img { width: 100%; max-height: 300px; object-fit: contain; margin-bottom: 15px; background: #fafafa; border-radius: 8px; padding: 10px; }
        .view-title { font-size: 20px; color: var(--primary-color); margin-bottom: 10px; text-align: right; }
        .view-desc { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 15px; text-align: right; white-space: pre-line; }

        footer { background: var(--primary-color); color: white; text-align: center; padding: 15px; position: fixed; bottom: 0; width: 100%; font-size: 14px; direction: ltr; z-index: 90; }
        footer a { color: #5cb8ff; text-decoration: none; }

        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .delete-btn { background: red; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area" id="logo-trigger" title="اضغط 5 مرات لفتح لوحة التحكم">
            <img src="https://images2.imgbox.com/39/da/hH9Z8YgW_o.png" alt="TechZone Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/200x70?text=TechZone'">
        </div>
    </header>

    <div class="categories-bar" id="categories-bar"></div>
    <div class="container" id="products-container" style="text-align: center; padding-top: 50px;">جاري تحميل المنتجات من السيرفر...</div>

    <div class="cart-badge" onclick="toggleModal('cart-modal')">
        🛒 <span class="cart-count" id="cart-count">0</span>
    </div>

    <div id="view-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('view-modal')">&times;</span>
            <div id="view-modal-body"></div>
        </div>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('cart-modal')">&times;</span>
            <h2 style="margin-bottom: 15px; text-align: right;">سلة التسوق</h2>
            <div id="cart-items"></div>
            <hr style="margin: 15px 0;">
            <div style="font-weight: bold; margin-bottom: 15px; text-align: right;">
                <p style="font-size: 14px; color: #555;">سعر التوصيل (كل المحافظات): 5,000 د.ع</p>
                <p id="total-price" style="font-size: 18px; color: var(--primary-color); margin-top: 5px;">المجموع الكلي: 0 د.ع</p>
            </div>
            
            <form id="order-form" onsubmit="sendOrder(event)">
                <div class="form-group">
                    <label>الاسم الكامل:</label>
                    <input type="text" id="customer-name" required placeholder="اسم المستلم الثلاثي">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف:</label>
                    <input type="tel" id="customer-phone" required placeholder="07XXXXXXXXX">
                </div>
                <div class="form-group">
                    <label>العنوان الكامل:</label>
                    <textarea id="customer-address" required rows="3" placeholder="المحافظة - المنطقة - أقرب نقطة دالة"></textarea>
                </div>
                <button type="submit" class="add-btn" style="background: #28a745;">تأكيد الطلب وإرسال عبر تليكرام 🚀</button>
            </form>
        </div>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('admin-modal')">&times;</span>
            <h2 style="text-align: right;">لوحة التحكم السحابية</h2>
            <hr style="margin: 15px 0;">
            <form id="add-product-form" onsubmit="addProduct(event)" style="margin-bottom: 20px;">
                <div class="form-group"><label>اسم المنتج:</label><input type="text" id="p-name" required></div>
                <div class="form-group"><label>القسم (مثال: ملحقات، سماعات، شواحن):</label><input type="text" id="p-category" required></div>
                <div class="form-group"><label>السعر (دينار عراقي):</label><input type="number" id="p-price" required></div>
                <div class="form-group"><label>رابط صورة المنتج المباشر:</label><input type="text" id="p-img" placeholder="رابط ينتهي بـ .jpg أو .png"></div>
                <div class="form-group"><label>وصف المنتج وتفاصيله الميزات:</label><textarea id="p-desc" rows="4"></textarea></div>
                <button type="submit" class="add-btn">إضافة المنتج للمتجر بشكل دائم 🌐</button>
            </form>
